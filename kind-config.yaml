kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fma-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Frontend
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP

      # Grafana
      - containerPort: 30180
        hostPort: 30180
        protocol: TCP

      # Prometheus
      - containerPort: 30190
        hostPort: 30190
        protocol: TCP

      # ArgoCD HTTPS
      - containerPort: 30443
        hostPort: 8082
        protocol: TCP
