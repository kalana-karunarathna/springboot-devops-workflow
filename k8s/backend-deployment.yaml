apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: backend
          image: 016170083143.dkr.ecr.us-east-1.amazonaws.com/fma-backend:build-15
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://mongo:27017/fma
